ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autofix_commit_msg: "style: pre-commit fixes"
  autoupdate_schedule: "weekly"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.22"
    hooks:
      - id: ruff-check
        args: [--fix, --show-fixes]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.20.0"
    hooks:
       - id: blacken-docs
         additional_dependencies: [black==23.*]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
        - id: check-added-large-files
          exclude: "uv\\.lock"
        - id: check-case-conflict
        - id: check-merge-conflict
        - id: check-yaml
        - id: debug-statements
        - id: end-of-file-fixer
        - id: mixed-line-ending
        - id: trailing-whitespace

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
        - id: python-check-blanket-type-ignore
        - id: rst-backticks
        - id: rst-directive-colons
        - id: rst-inline-touching-normal

  - repo: local
    hooks:
      - id: check-comment-blocks
        name: check comment blocks
        entry: python scripts/check_comment_blocks.py
        language: python
        types_or: [python, pyi]
      - id: check-notebook-output-leaks
        name: check notebook output leaks
        entry: python scripts/check_notebook_output_leaks.py
        language: python
        types: [jupyter]
      - id: check-changelog
        name: check changelog
        entry: python scripts/check_changelog.py
        language: python
        files: ^CHANGELOG\.md$

  - repo: https://github.com/scientific-python/cookie
    rev: 2026.06.18
    hooks:
        - id: sp-repo-review

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.27.0
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: sync-pybammsolvers-version
        name: Sync pybammsolvers version.py into pyproject.toml and vcpkg.json
        entry: python packages/pybammsolvers/scripts/sync_version.py
        language: python
        files: ^packages/pybammsolvers/(src/pybammsolvers/version\.py|pyproject\.toml|vcpkg\.json)$
        pass_filenames: false
