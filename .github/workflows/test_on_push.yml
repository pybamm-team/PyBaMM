name: PyBaMM

on:
  pull_request:
  # Run on pushes to main as well, primarily to warm the solver-wheel cache
  # (keyed on the solver source hash) so PyBaMM-only PRs get a cache hit instead
  # of rebuilding the solver. Also gives a post-merge health signal for main.
  push:
    branches:
      - main


permissions: {}

env:
  PYBAMM_DISABLE_TELEMETRY: "true"
  FORCE_COLOR: 3

concurrency:
  # github.workflow: name of the workflow, so that we don't cancel other workflows
  # github.event.pull_request.number || github.ref: pull request number or branch name if not a pull request
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel in-progress runs when a new workflow with the same group name is triggered
  # This avoids workflow runs on both pushes and PRs
  cancel-in-progress: true

jobs:
  # Dependency-aware routing. `solver`/`pybamm`/`docs` say which subsystems a PR
  # touches so we only run (and only build the solver for) what's needed.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      solver: ${{ steps.filter.outputs.solver }}
      pybamm: ${{ steps.filter.outputs.pybamm }}
      docs: ${{ steps.filter.outputs.docs }}
      # Solver-wheel platforms each scenario's downstream jobs actually consume.
      platforms: ${{ steps.route.outputs.platforms }}
      macos_runners: ${{ steps.route.outputs.macos_runners }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            solver:
              - 'packages/pybammsolvers/**'
              - '.github/workflows/_build_solver_wheels.yml'
            pybamm:
              - 'packages/pybamm/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
              - 'conftest.py'
              - '.github/workflows/test_on_push.yml'
            docs:
              - 'docs/**'

      # Map "what changed" to the solver wheels to build: solver PRs validate every
      # platform; pybamm/push need the sparse matrix's runners; docs-only needs Linux.
      - id: route
        env:
          EVENT: ${{ github.event_name }}
          SOLVER: ${{ steps.filter.outputs.solver }}
          PYBAMM: ${{ steps.filter.outputs.pybamm }}
        run: |
          if [ "$SOLVER" = true ]; then
            platforms='["linux", "windows"]'
            macos='["macos-15-intel", "macos-latest"]'
          elif [ "$EVENT" = push ] || [ "$PYBAMM" = true ]; then
            platforms='["linux", "windows"]'
            macos='["macos-latest"]'
          else
            platforms='["linux"]'
            macos='[]'
          fi
          {
            echo "platforms=$platforms"
            echo "macos_runners=$macos"
          } >> "$GITHUB_OUTPUT"

  style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Check style
        run: uvx pre-commit run -a

      - name: Check uv.lock is up to date
        run: uv lock --check

  # Build the in-repo solver once per platform (cibuildwheel, incl. Windows via
  # vcpkg) and cache the wheels on the solver source hash. PyBaMM's matrix below
  # installs these prebuilt wheels instead of rebuilding the solver per cell.
  # The reusable workflow's CIBW_TEST_COMMAND also runs the solver's own pytest
  # on every platform, which (with the PyBaMM matrix) supersedes the solver's
  # old standalone unit/integration workflows.
  build_solver:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.solver == 'true' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.docs == 'true' }}
    # Pass contents:read down to the called workflow (this workflow's top-level
    # permissions are {}, so the reusable workflow's checkout would otherwise
    # get no token scope).
    permissions:
      contents: read
    uses: ./.github/workflows/_build_solver_wheels.yml
    with:
      cache_wheels: true
      build_sdist: false
      # Temporary while validating the patch-free registry port; remove after merge-readiness.
      save_vcpkg_logs: true
      # Build only the wheels the triggered jobs consume (see the changes job's route step).
      platforms: ${{ needs.changes.outputs.platforms }}
      macos_runners: ${{ needs.changes.outputs.macos_runners }}

  run_unit_tests:
    needs: [changes, build_solver]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.solver == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      # PR matrix: full Python on Linux + min/max endpoints on the 10x macOS/Windows
      # runners; macos-15-intel and interior versions run nightly (run_periodic_tests.yml).
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})

    env:
      # noxfile install_locked installs the matching prebuilt solver wheel from
      # this directory instead of building the solver from source.
      PYBAMM_SOLVER_WHEELS: ${{ github.workspace }}/solver-wheels

    steps:
      - name: Check out PyBaMM repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: gfortran gcc graphviz pandoc
          execute_install_scripts: true

      # dot -c is for registering graphviz fonts and plugins
      - name: Install OpenBLAS and TeXLive for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo dot -c
          sudo apt-get install libopenblas-dev texlive-latex-extra dvipng

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-15-intel' || matrix.os == 'macos-latest'
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_COLOR: 1
          # Speed up CI
          NONINTERACTIVE: 1
        # sometimes gfortran cannot be found, so reinstall gcc just to be sure
        run: |
          brew analytics off
          brew install graphviz libomp
          brew reinstall gcc

      - name: Install Windows system dependencies
        if: matrix.os == 'windows-latest'
        run: winget install --id Graphviz.Graphviz --exact --accept-source-agreements --accept-package-agreements

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install nox
        run: uv tool install nox

      - name: Download in-repo solver wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.os == 'ubuntu-latest' && 'wheels_manylinux' || matrix.os == 'windows-latest' && 'wheels_windows' || format('wheels_{0}', matrix.os) }}
          path: solver-wheels

      - name: Run unit tests for ${{ matrix.os }} with Python ${{ matrix.python-version }}
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13'
        run: nox -s unit

      - name: Run coverage tests for ${{ matrix.os }} with Python ${{ matrix.python-version }}
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: nox -s coverage

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run integration tests for ${{ matrix.os }} with Python ${{ matrix.python-version }}
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: nox -s integration

  # Guards the `pip install pybamm` user path: in-repo PyBaMM against the
  # *released* PyPI solver (--no-sources ignores the workspace source so
  # pybammsolvers resolves from PyPI). main-to-main testing can't cover this.
  released_solver_smoke:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.solver == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Released-solver smoke (ubuntu-latest / Python 3.13)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: gfortran gcc libopenblas-dev
          execute_install_scripts: true

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install PyBaMM against the released PyPI solver and smoke-test IDAKLU
        run: |
          uv venv
          uv pip install --no-sources "./packages/pybamm[all]" --group "packages/pybamm/pyproject.toml:dev"
          . .venv/bin/activate
          python -m pytest packages/pybamm/tests/unit/test_solvers/test_idaklu_solver.py -q

  # `uv sync` based so the solver's auto-bootstrap fires.
  #  Guards both the bootstrap and the clean-clone dev experience.
  from_source_smoke:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.solver == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: From-source solver smoke (ubuntu-latest / Python 3.13)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
          persist-credentials: false

      # Plain apt (not the cache action): the from-source SuiteSparse build needs
      # libblas.so's update-alternatives symlink, which apt file-tree caching drops.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran gcc make cmake libopenblas-dev

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: From-source uv sync (auto-bootstraps SUNDIALS) + IDAKLU smoke
        run: |
          uv sync --extra all --group dev
          uv run python -m pytest packages/pybamm/tests/unit/test_solvers/test_idaklu_solver.py -q

  run_doctests:
    needs: [changes, build_solver]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.solver == 'true' || needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
    name: Doctests (ubuntu-latest / Python 3.13)
    env:
      PYBAMM_SOLVER_WHEELS: ${{ github.workspace }}/solver-wheels

    steps:
      - name: Check out PyBaMM repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: graphviz pandoc
          execute_install_scripts: true

      # dot -c is for registering graphviz fonts and plugins
      - name: Install TeXLive for Linux
        run: |
          sudo apt-get update
          sudo dot -c
          sudo apt-get install texlive-latex-extra dvipng

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install nox
        run: uv tool install nox

      - name: Download in-repo solver wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels_manylinux
          path: solver-wheels

      - name: Install docs dependencies and run doctests for GNU/Linux
        run: nox -s doctests

      - name: Check if the documentation can be built for GNU/Linux
        run: nox -s docs

  run_example_tests:
    needs: [changes, build_solver]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.solver == 'true' || needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
    name: Example notebooks (ubuntu-latest / Python 3.13)
    env:
      PYBAMM_SOLVER_WHEELS: ${{ github.workspace }}/solver-wheels

    steps:
      - name: Check out PyBaMM repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: gfortran gcc graphviz pandoc
          execute_install_scripts: true

      # dot -c is for registering graphviz fonts and plugins
      - name: Install OpenBLAS and TeXLive for Linux
        run: |
          sudo apt-get update
          sudo dot -c
          sudo apt-get install libopenblas-dev texlive-latex-extra dvipng

      - name: Set up Python 3.13
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install nox
        run: uv tool install nox

      - name: Download in-repo solver wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels_manylinux
          path: solver-wheels

      - name: Run example notebooks tests for GNU/Linux with Python 3.13
        run: nox -s examples

  run_scripts_tests:
    needs: [changes, build_solver]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.solver == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
    name: Example scripts (ubuntu-latest / Python 3.13)
    env:
      PYBAMM_SOLVER_WHEELS: ${{ github.workspace }}/solver-wheels

    steps:
      - name: Check out PyBaMM repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: gfortran gcc graphviz
          execute_install_scripts: true

      # dot -c is for registering graphviz fonts and plugins
      - name: Install OpenBLAS and TeXLive for Linux
        run: |
          sudo apt-get update
          sudo dot -c
          sudo apt-get install libopenblas-dev texlive-latex-extra dvipng

      - name: Set up Python 3.13
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install nox
        run: uv tool install nox

      - name: Download in-repo solver wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels_manylinux
          path: solver-wheels

      - name: Run example scripts tests for GNU/Linux with Python 3.13
        run: nox -s scripts

  run_memory_tests:
    needs: [changes, build_solver]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.pybamm == 'true' || needs.changes.outputs.solver == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Memory tests (ubuntu-latest / Python 3.13)
    env:
      PYBAMM_SOLVER_WHEELS: ${{ github.workspace }}/solver-wheels

    steps:
      - name: Check out PyBaMM repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: gfortran gcc graphviz
          execute_install_scripts: true

      - name: Install OpenBLAS for Linux
        run: |
          sudo apt-get update
          sudo apt-get install libopenblas-dev

      - name: Set up Python 3.13
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install nox
        run: uv tool install nox

      - name: Download in-repo solver wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels_manylinux
          path: solver-wheels

      - name: Run memory tests for GNU/Linux with Python 3.13
        run: nox -s memory
