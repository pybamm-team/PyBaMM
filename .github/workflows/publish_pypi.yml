name: Build and publish package to PyPI
on:
  release:
    types: [published]


permissions: {}

jobs:
  build:
    # Monorepo: publishes ONLY pybamm (tag namespace `pybamm-v` distinguishes from pybammsolvers)
    if: startsWith(github.event.release.tag_name, 'pybamm-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          # Full history + tags so hatch-vcs can resolve the pybamm-v* version.
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14

      - name: Build wheel
        # Build the pybamm workspace package (its pyproject now lives under packages/).
        run: pipx run build packages/pybamm --outdir deploy

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: deploy/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: deploy
          merge-multiple: true

      - name: Publish on PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: deploy/
