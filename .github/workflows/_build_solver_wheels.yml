# Reusable workflow: build pybammsolvers wheels (+ optional sdist) from in-repo source.
# Called by release_solvers.yml (no cache) and test_on_push.yml (cached on solver git-tree hash).
name: Build solver wheels (reusable)

on:
  workflow_call:
    inputs:
      cache_wheels:
        description: "Restore/save per-platform wheels keyed on the solver source hash, skipping the build on a cache hit."
        default: false
        required: false
        type: boolean
      build_sdist:
        description: "Also build the sdist (needed for release publishing; not needed for PR testing)."
        default: false
        required: false
        type: boolean
      save_vcpkg_logs:
        description: "Upload vcpkg build logs for Windows (useful for debugging CI failures)."
        default: false
        required: false
        type: boolean
      platforms:
        description: 'JSON array of non-macOS targets to build, subset of ["linux", "windows"]. Lets a caller build only the wheels its downstream jobs consume.'
        default: '["linux", "windows"]'
        required: false
        type: string
      macos_runners:
        description: 'JSON array of macOS runner labels to build on (e.g. ["macos-latest"]); empty [] skips macOS entirely.'
        default: '["macos-15-intel", "macos-latest"]'
        required: false
        type: string

defaults:
  run:
    working-directory: packages/pybammsolvers

env:
  CIBW_BUILD_VERBOSITY: 2
  # Skip PyPy, MUSL, and free-threaded Python builds (CasADi lacks cp314t wheels)
  CIBW_SKIP: "pp* *musllinux* cp314t*"
  FORCE_COLOR: 3

jobs:
  build_windows_wheels:
    name: Wheels (Windows)
    if: ${{ contains(fromJSON(inputs.platforms), 'windows') }}
    runs-on: windows-2025
    permissions:
      contents: read
    env:
      # Single source of truth for the vcpkg tag — shared by the clone and the
      # binary-cache key so a version bump rotates the cache, never poisons it.
      VCPKG_TAG: "2026.06.24"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - name: Compute solver source hash
        id: solverhash
        shell: bash
        working-directory: ${{ github.workspace }}
        run: echo "hash=$(git rev-parse HEAD:packages/pybammsolvers)" >> "$GITHUB_OUTPUT"

      - name: Restore cached wheels
        id: cache
        if: inputs.cache_wheels
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/pybammsolvers/wheelhouse
          key: solver-wheels-windows-${{ steps.solverhash.outputs.hash }}

      # Persist vcpkg's binary cache (built ports) across runs so a solver-only PR
      # skips rebuilding deps. Gated to the cached path; releases build fresh.
      - name: Cache vcpkg binary artifacts
        id: vcpkgcache
        if: ${{ inputs.cache_wheels && steps.cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\vcpkg-archives
          key: vcpkg-x64-windows-static-md-${{ env.VCPKG_TAG }}-${{ hashFiles('packages/pybammsolvers/vcpkg.json', 'packages/pybammsolvers/vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-windows-static-md-${{ env.VCPKG_TAG }}-

      # vcpkg (see VCPKG_TAG): sundials comes from the pybamm-team registry; its
      # klu feature needs only suitesparse-klu (no LAPACK/Fortran/MSYS2 chain).
      - name: Install vcpkg on Windows
        if: ${{ !(inputs.cache_wheels && steps.cache.outputs.cache-hit == 'true') }}
        run: |
          cd C:\
          rm -r -fo 'C:\vcpkg'
          git clone https://github.com/microsoft/vcpkg --branch ${{ env.VCPKG_TAG }}
          cd vcpkg
          .\bootstrap-vcpkg.bat
          # Binary-cache dir must exist before the build; -Force no-ops (keeps
          # contents) if the cache-restore step already created it.
          New-Item -ItemType Directory -Force -Path C:\vcpkg-archives | Out-Null

      - name: Build wheels on Windows
        if: ${{ !(inputs.cache_wheels && steps.cache.outputs.cache-hit == 'true') }}
        run: pipx run cibuildwheel --output-dir wheelhouse
        env:
          # VCPKG_DEFAULT_BINARY_CACHE pins vcpkg's files cache to a dir actions/cache
          # persists (see cache step): ports shared across the 5 builds and across runs.

          # No CMAKE_GENERATOR pin: CMake resolves the image's installed VS.

          # Forward-slash paths: cibuildwheel shell-parses these, so a backslash arrives
          # drive-relative (C:vcpkg) and breaks vcpkg's children.
          CIBW_ENVIRONMENT: >
            VCPKG_ROOT_DIR=C:/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-windows-static-md
            VCPKG_DEFAULT_BINARY_CACHE=C:/vcpkg-archives
            VCPKG_FEATURE_FLAGS=manifests,registries
            CMAKE_GENERATOR_PLATFORM=x64
          CIBW_ARCHS: AMD64
          CIBW_BEFORE_BUILD: python -m pip install delvewheel
          CIBW_REPAIR_WHEEL_COMMAND: delvewheel repair --add-path C:/Windows/System32 -w {dest_dir} {wheel}
          CIBW_TEST_EXTRAS: "dev"
          CIBW_TEST_COMMAND: |
            python -m pytest {project}/tests
      - name: Upload vcpkg build logs
        if: ${{ inputs.save_vcpkg_logs && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vcpkg-logs-windows
          path: |
            C:\vcpkg\buildtrees\sundials\*.log
            C:\vcpkg\buildtrees\detect_compiler\*.log
          if-no-files-found: ignore
      - name: Upload Windows wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels_windows
          path: packages/pybammsolvers/wheelhouse/*.whl
          if-no-files-found: error

  build_manylinux_wheels:
    name: Wheels (Linux ${{ matrix.arch }})
    if: ${{ contains(fromJSON(inputs.platforms), 'linux') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 uses the default manylinux2014; CasADi's x86_64 wheel is
          # built with the legacy libstdc++ ABI (CentOS 7, EPEL disabled).
          - arch: x86_64
            runner: ubuntu-latest
            artifact: wheels_manylinux
            before_all: >
              yum -y --disablerepo=epel install openblas-devel lapack-devel &&
              python install_KLU_Sundials.py
          # aarch64 needs manylinux_2_34: CasADi's aarch64 wheel wants a GCC>=11
          # libstdc++ (C++11 ABI) older images lack; openblas/lapack come from CRB.
          - arch: aarch64
            runner: ubuntu-24.04-arm
            artifact: wheels_manylinux_aarch64
            before_all: >
              dnf config-manager --set-enabled crb &&
              dnf -y install openblas-devel lapack-devel &&
              python install_KLU_Sundials.py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - name: Compute solver source hash
        id: solverhash
        shell: bash
        working-directory: ${{ github.workspace }}
        run: echo "hash=$(git rev-parse HEAD:packages/pybammsolvers)" >> "$GITHUB_OUTPUT"

      - name: Restore cached wheels
        id: cache
        if: inputs.cache_wheels
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/pybammsolvers/wheelhouse
          key: solver-wheels-linux-${{ matrix.arch }}-${{ steps.solverhash.outputs.hash }}

      - name: Build wheels on Linux
        if: ${{ !(inputs.cache_wheels && steps.cache.outputs.cache-hit == 'true') }}
        run: pipx run cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          # aarch64 requires GCC>=11 libstdc++ for CasADi's C++11-ABI wheel;
          # ignored for the x86_64 build (which uses the default manylinux2014).
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_34
          CIBW_BEFORE_ALL_LINUX: ${{ matrix.before_all }}
          # libcasadi ships as a pip dep (resolved at runtime via $ORIGIN/../casadi).
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair --exclude libcasadi.so.3.7 -w {dest_dir} {wheel}
          CIBW_TEST_EXTRAS: "dev"
          CIBW_TEST_COMMAND: |
            set -e -x
            python -m pytest {project}/tests

      - name: Upload wheels for Linux
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: packages/pybammsolvers/wheelhouse/*.whl
          if-no-files-found: error

  build_macos_wheels:
    name: Wheels (${{ matrix.os }})
    if: ${{ inputs.macos_runners != '[]' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.macos_runners) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - name: Compute solver source hash
        id: solverhash
        shell: bash
        working-directory: ${{ github.workspace }}
        run: echo "hash=$(git rev-parse HEAD:packages/pybammsolvers)" >> "$GITHUB_OUTPUT"

      - name: Restore cached wheels
        id: cache
        if: inputs.cache_wheels
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: packages/pybammsolvers/wheelhouse
          key: solver-wheels-${{ matrix.os }}-${{ steps.solverhash.outputs.hash }}

      - name: Install Fortran compiler
        if: ${{ !(inputs.cache_wheels && steps.cache.outputs.cache-hit == 'true') }}
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_COLOR: 1
          NONINTERACTIVE: 1
        run: |
          brew analytics off
          brew install libomp
          brew reinstall gcc

      - name: Install cibuildwheel
        if: ${{ !(inputs.cache_wheels && steps.cache.outputs.cache-hit == 'true') }}
        run: python -m pip install cibuildwheel

      - name: Build wheels on macOS
        if: ${{ !(inputs.cache_wheels && steps.cache.outputs.cache-hit == 'true') }}
        shell: bash
        run: |
            set -e -x

            # Set LLVM-OpenMP URL
            if [[ $(uname -m) == "x86_64" ]]; then
              OPENMP_URL="https://anaconda.org/conda-forge/llvm-openmp/11.1.0/download/osx-64/llvm-openmp-11.1.0-hda6cdc1_1.tar.bz2"
            elif [[ $(uname -m) == "arm64" ]]; then
              OPENMP_URL="https://anaconda.org/conda-forge/llvm-openmp/11.1.0/download/osx-arm64/llvm-openmp-11.1.0-hf3c4609_1.tar.bz2"
            fi

            export SDKROOT=${SDKROOT:-$(xcrun --show-sdk-path)}
            SOLVER_LIB_PATH=$(pwd)/.idaklu/lib

            mkdir -p $SOLVER_LIB_PATH

            # Can't download LLVM-OpenMP directly, use conda and set environment variables
            brew install miniforge
            conda create -n pybammsolvers-dev $OPENMP_URL
            if [[ $(uname -m) == "x86_64" ]]; then
              PREFIX="/usr/local/Caskroom/miniforge/base/envs/pybammsolvers-dev"
            elif [[ $(uname -m) == "arm64" ]]; then
              PREFIX="/opt/homebrew/Caskroom/miniforge/base/envs/pybammsolvers-dev"
            fi

            # Copy libomp.dylib from PREFIX to $SOLVER_LIB_PATH, needed for wheel repair
            cp $PREFIX/lib/libomp.dylib $SOLVER_LIB_PATH/.
            install_name_tool -id $SOLVER_LIB_PATH/libomp.dylib $SOLVER_LIB_PATH/libomp.dylib
            codesign --force --sign - $SOLVER_LIB_PATH/libomp.dylib

            export CC=/usr/bin/clang
            export CXX=/usr/bin/clang++
            # Link conda libomp (not Homebrew's — too-high MACOSX_DEPLOYMENT_TARGET).
            # One libomp source ensures delocate bundles a single copy.
            export CPPFLAGS="$CPPFLAGS -Xpreprocessor -fopenmp"
            export CFLAGS="$CFLAGS -I$PREFIX/include"
            export CXXFLAGS="$CXXFLAGS -I$PREFIX/include"
            export LDFLAGS="$LDFLAGS -L$PREFIX/lib -lomp"

            # install_KLU_Sundials.py checks CIBUILDWHEEL to decide whether to
            # inject Homebrew OpenMP overrides; set it so it uses conda libomp.
            export CIBUILDWHEEL="1"

            python install_KLU_Sundials.py
            python -m cibuildwheel --output-dir wheelhouse
        env:
          # 10.13 for Intel (macos-15-intel), 11.0 for Apple Silicon (macos-latest)
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos-latest' && '11.0' || '10.13' }}
          CIBW_ARCHS_MACOS: auto
          CIBW_BEFORE_BUILD: python -m pip install delocate
          # libcasadi in build venv not visible to delocate; exclude it
          CIBW_REPAIR_WHEEL_COMMAND: |
            if [[ $(uname -m) == "x86_64" ]]; then
              delocate-listdeps {wheel} && delocate-wheel -v -w {dest_dir} {wheel} --exclude libcasadi --ignore-missing-dependencies
            elif [[ $(uname -m) == "arm64" ]]; then
              # Use higher macOS target for now since casadi/libc++.1.0.dylib is still not fixed
              delocate-listdeps {wheel} && delocate-wheel -v -w {dest_dir} {wheel} --exclude libcasadi --ignore-missing-dependencies --require-target-macos-version 11.1
              for file in {dest_dir}/*.whl; do mv "$file" "${file//macosx_11_1/macosx_11_0}"; done
            fi
          CIBW_TEST_EXTRAS: "dev"
          CIBW_TEST_COMMAND: |
            set -e -x
            python -m pytest {project}/tests

      - name: Upload wheels for macOS (amd64, arm64)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels_${{ matrix.os }}
          path: packages/pybammsolvers/wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build SDist
    if: inputs.build_sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - name: Build SDist
        run: pipx run build --sdist

      - name: Upload SDist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: packages/pybammsolvers/dist/*.tar.gz
          if-no-files-found: error
