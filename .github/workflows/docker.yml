name: Build and push Docker images to Docker Hub

on:
  workflow_dispatch:
  release:
    types: [published]

permissions: {}

jobs:
  build_docker_image:
    # Skipped in forks; on releases, build only for pybamm-v* tags so
    # solver (pybammsolvers-v*) releases don't republish the image.
    if: github.repository == 'pybamm-team/PyBaMM' && (github.event_name != 'release' || startsWith(github.event.release.tag_name, 'pybamm-v'))
    name: Build image
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: scripts/Dockerfile
          tags: pybamm/pybamm:latest
          push: true
          platforms: linux/amd64
          no-cache: true

      - name: List built image(s)
        run: docker images
