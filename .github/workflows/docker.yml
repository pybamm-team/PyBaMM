name: Build and push Docker images to Docker Hub

on:
  workflow_dispatch:
  release:
    types: [published]

permissions: {}

jobs:
  build_docker_image:
    # Skipped in forks; on releases, build only for pybamm-v* tags so
    # solver (pybammsolvers-v*) releases don't republish the image.
    if: github.repository == 'pybamm-team/PyBaMM' && (github.event_name != 'release' || startsWith(github.event.release.tag_name, 'pybamm-v'))
    name: Build image
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: false
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: scripts/Dockerfile
          tags: pybamm/pybamm:latest
          push: true
          platforms: linux/amd64
          no-cache: true

      - name: List built image(s)
        run: docker images
