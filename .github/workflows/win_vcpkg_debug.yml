# TEMPORARY diagnostic harness for the Windows wheel modernisation (PR #5650);
# branch-scoped, deleted before merge. Standalone/manifest/toolchain probes all pass
# on vcpkg 2026.06.24; only real cibuildwheel runs fail in detect_compiler's
# 'vcpkg fetch ninja' (child rc 1, stderr swallowed). This runs one python's build
# inside cibuildwheel with the fetch surfaced in BEFORE_BUILD and vcpkg --debug on.
name: Windows vcpkg debug (temporary)

on:
  push:
    branches: [fix-windows-wheel-suitesparse-klu]

permissions: {}

env:
  FORCE_COLOR: 3

jobs:
  cibw_repro:
    name: cibuildwheel repro on windows-2025 + vcpkg 2026.06.24
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13

      - name: Install vcpkg 2026.06.24
        run: |
          git clone --depth 1 --branch 2026.06.24 https://github.com/microsoft/vcpkg C:\vcpkg-dbg
          cd C:\vcpkg-dbg
          .\bootstrap-vcpkg.bat

      - name: cibuildwheel single-python repro (fetch surfaced, vcpkg --debug)
        continue-on-error: true
        timeout-minutes: 45
        working-directory: packages/pybammsolvers
        run: pipx run cibuildwheel --output-dir C:\wheelhouse-dbg
        env:
          CIBW_BUILD: "cp310-win_amd64"
          CIBW_BUILD_VERBOSITY: 2
          CIBW_ARCHS: AMD64
          # fetch ninja where stderr is visible, then dump the exact env vcpkg sees
          CIBW_BEFORE_BUILD: C:\vcpkg-dbg\vcpkg.exe fetch ninja & set
          CIBW_ENVIRONMENT: >
            VCPKG_ROOT_DIR=C:/vcpkg-dbg
            VCPKG_DEFAULT_TRIPLET=x64-windows-static-md
            VCPKG_FEATURE_FLAGS=manifests,registries
            CMAKE_GENERATOR_PLATFORM=x64
            CMAKE_ARGS="-DVCPKG_INSTALL_OPTIONS=--debug"

      - name: Upload vcpkg debug logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vcpkg-cibw-debug-logs
          path: |
            C:\vcpkg-dbg\buildtrees\detect_compiler\*.log
          if-no-files-found: ignore
