version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # group updates in a single PR
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  # Maintain Python dependencies via uv lockfile
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
